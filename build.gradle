buildscript {
    // https://stackoverflow.com/a/78506238
    // https://youtrack.jetbrains.com/issue/KT-60507/Kapt-IllegalAccessError-superclass-access-check-failed-using-java-21-toolchain
    ext.kotlin_version = '1.9.21'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    group = 'io.noties'
    version = '5.1.0-SNAPSHOT'

    tasks.withType(Javadoc) {
        enabled(false)
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}

wrapper {
    gradleVersion '7.4'
    distributionType 'all'
}

ext {

    config = [
            'min-sdk'    : 23,
            'target-sdk' : 33
    ]

    deps = [
            // https://developer.android.com/jetpack/androidx/releases/annotation
            'x-annotations' : 'androidx.annotation:annotation:1.9.1',
            // https://developer.android.com/jetpack/androidx/releases/recyclerview
            'x-recyclerview': 'androidx.recyclerview:recyclerview:1.3.2',
            // https://developer.android.com/jetpack/androidx/releases/viewpager
            'x-viewpager'   : 'androidx.viewpager:viewpager:1.0.0',
            // https://developer.android.com/jetpack/androidx/releases/viewpager2
            'x-viewpager2'  : 'androidx.viewpager2:viewpager2:1.0.0',

            // https://github.com/google/flexbox-layout
            'flexbox': 'com.google.android.flexbox:flexbox:3.0.0',

            'junit4'        : 'junit:junit:4.13.2',

            // https://github.com/mockito/mockito
            'mockito'       : 'org.mockito:mockito-core:4.8.0',

            // https://github.com/robolectric/robolectric
            'robolectric'   : 'org.robolectric:robolectric:4.9',

            // https://github.com/mockito/mockito-kotlin
            'mockito-kotlin': 'org.mockito.kotlin:mockito-kotlin:4.0.0'
    ]
}
